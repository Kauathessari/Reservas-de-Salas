<!DOCTYPE html>
<html>
<head>
    <title>Cadastrar Sala</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="navbar">
    SMART CAMPUS
</div>

<div class="container">

    <div class="card">

        <h2>🏫 Cadastro de Sala</h2>

        <form method="POST">

            <input
                type="text"
                name="nome"
                placeholder="Nome da Sala"
                required
            >

            <input
                type="number"
                name="capacidade"
                placeholder="Capacidade"
                required
            >

            <input
                type="text"
                name="local"
                placeholder="Local"
                required
            >

            <button type="submit">
                Salvar Sala
            </button>

        </form>

        <br>

        <a class="btn-voltar" href="/dashboard">
            ← Voltar
        </a>

    </div>

</div>

</body>
</html>
